<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zmrzlina točená – TV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Ms+Madi&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #3d1e08; }

  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 65% 40%, #7a3515 0%, #4a2010 30%, #2a1008 70%, #1a0804 100%);
  }

  .wrapper {
    position: relative; width: 100vw; height: 100vh;
    display: flex; flex-direction: column; z-index: 1;
  }

  /* TOP ZONE */
  .top-zone {
    flex: 1; position: relative; display: flex; align-items: stretch; min-height: 0;
  }

  .text-block {
    position: absolute; left: 3vw; bottom: 2vh; z-index: 10;
  }
  .label-zmrzlina {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5.5vw; color: #fff;
    line-height: 0.9; white-space: nowrap; letter-spacing: 0.05em;
  }
  .label-tocena {
    font-family: 'Ms Madi', cursive;
    font-size: 4.5vw; color: #dfbd95; line-height: 1.2;
  }

  .ice-creams {
    position: absolute; top: 0; right: 0; height: 100%;
    display: flex; align-items: stretch;
  }
  .ice-cream-slot {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; position: relative;
  }
  .flavor-label {
    position: absolute; top: 3vh; text-align: center; z-index: 10; width: 100%; padding: 0 5px;
  }
  .flavor-name {
    font-family: 'Bebas Neue', sans-serif; color: white;
    text-transform: uppercase; letter-spacing: 0.08em;
    text-shadow: 0 2px 15px rgba(0,0,0,0.8); white-space: nowrap;
  }
  .flavor-sub {
    font-family: 'Bebas Neue', sans-serif; color: rgba(255,255,255,0.7);
    letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 0.9vw; white-space: nowrap;
  }
  .flavor-sub::before, .flavor-sub::after {
    content: ''; display: block; height: 1px; width: 15px; background: rgba(255,255,255,0.5);
  }

  /* ICE CREAM */
  .ice-img-wrap {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .ice-img {
    width: 80%; height: 80%; object-fit: contain;
    mix-blend-mode: lighten;
    filter: drop-shadow(0 10px 40px rgba(0,0,0,0.3));
    animation: iceBounce 6s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes iceBounce {
    0%   { transform: rotate(-2deg) scale(1); }
    25%  { transform: rotate(2deg) scale(1.03); }
    50%  { transform: rotate(-1deg) scale(1); }
    75%  { transform: rotate(1.5deg) scale(1.02); }
    100% { transform: rotate(-2deg) scale(1); }
  }
  .ice-cream-slot:nth-child(1) .ice-img { animation-delay: 0s; }
  .ice-cream-slot:nth-child(3) .ice-img { animation-delay: -2s; }
  .ice-cream-slot:nth-child(5) .ice-img { animation-delay: -4s; }
  .ice-cream-slot:nth-child(7) .ice-img { animation-delay: -1s; }
  .ice-cream-slot:nth-child(9) .ice-img { animation-delay: -3s; }

  /* MICHANA – půl na půl */
  .michana-wrap {
    position: relative; overflow: hidden;
    width: 80%; height: 80%;
  }
  .michana-half {
    position: absolute; top: 0; width: 50%; height: 100%;
    overflow: hidden;
  }
  .michana-left { left: 0; }
  .michana-right { right: 0; }
  .michana-img {
    position: absolute; top: 0; height: 100%; object-fit: contain;
    mix-blend-mode: lighten;
    filter: drop-shadow(0 10px 40px rgba(0,0,0,0.3));
    animation: iceBounce 6s ease-in-out infinite;
    width: 200% !important;
  }
  .michana-left .michana-img { left: 0; }
  .michana-right .michana-img { right: 0; }

  .slot-price {
    position: absolute; bottom: 5vh; right: 1.5vw;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3vw; color: white;
    letter-spacing: 0.05em;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    z-index: 10;
  }

  .divider-v {
    width: 1px; height: 55vh; background: rgba(223,189,149,0.2); align-self: center; flex-shrink: 0;
  }

  /* LAYOUTS – 3-páka */
  .layout-3 .ice-creams { width: 72vw; left: 20vw; }
  .layout-3 .ice-cream-slot { width: 33.33%; }
  .layout-3 .flavor-name { font-size: 3.2vw; }
  .layout-3 .slot-price { font-size: 2.5vw; }

  /* LAYOUTS – 5-páka */
  .layout-5 .ice-creams { width: 80vw; left: 16vw; }
  .layout-5 .ice-cream-slot { width: 20%; }
  .layout-5 .flavor-name { font-size: 2vw; }
  .layout-5 .slot-price { font-size: 1.8vw; bottom: 3vh; }
  .layout-5 .ice-img { width: 90%; height: 90%; }
  .layout-5 .michana-wrap { width: 90%; height: 90%; }
  .layout-5 .flavor-sub { font-size: 0.7vw; }

  /* BOTTOM ZONE */
  .bottom-zone {
    height: 28vh; flex-shrink: 0; display: flex;
    border-top: 1px solid rgba(223,189,149,0.25);
    background: rgba(0,0,0,0.35);
    position: relative;
  }
  .pohar-slot {
    flex: 1; display: flex; align-items: center;
    padding: 0 2.5vw; gap: 2vw;
    position: relative; overflow: hidden;
  }
  .pohar-slot:first-child { border-right: 1px solid rgba(223,189,149,0.2); }
  .pohar-img {
    height: 22vh; object-fit: contain; mix-blend-mode: lighten;
    filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4));
    flex-shrink: 0; position: relative; z-index: 2;
  }
  .pohar-info { flex: 1; position: relative; z-index: 2; }
  .pohar-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3vw; color: #dfbd95; letter-spacing: 0.05em; line-height: 1;
  }
  .pohar-desc {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4vw; color: rgba(255,255,255,0.6);
    letter-spacing: 0.08em; margin-top: 6px; line-height: 1.5;
  }
  .pohar-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3vw; color: white;
    background: rgba(209,75,31,0.9);
    padding: 4px 18px; border-radius: 6px;
    margin-top: 10px; display: inline-block;
    letter-spacing: 0.05em;
  }

  /* FALLING CANDIES */
  .candy {
    position: absolute; pointer-events: none; z-index: 1;
    animation: fallCandy linear infinite;
  }
  @keyframes fallCandy {
    0%   { transform: translateY(-30px) rotate(0deg); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { transform: translateY(30vh) rotate(600deg); opacity: 0; }
  }

  .empty-msg {
    color: rgba(255,255,255,0.3); font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; margin: auto; letter-spacing: 0.1em; position: relative; z-index: 10;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .text-block  { animation: fadeInUp 0.8s ease forwards; }
  .ice-cream-slot { animation: fadeInUp 0.7s ease both; }
  .bottom-zone { animation: fadeInUp 0.8s 0.4s ease both; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrapper">
  <div class="top-zone" id="top-zone"></div>
  <div class="bottom-zone">
    <div class="pohar-slot" id="pohar-lentilky">
      <img class="pohar-img" src="https://liberskelahudky.github.io/zmrzlina/Poharek_lentilka.png" alt="Pohár lentilky" />
      <div class="pohar-info">
        <div class="pohar-name">POHÁR LENTILKY</div>
        <div class="pohar-desc">Zmrzlina · poleva čokoláda · lentilky</div>
        <div class="pohar-price">79 Kč</div>
      </div>
    </div>
    <div class="pohar-slot" id="pohar-orisky">
      <img class="pohar-img" src="https://liberskelahudky.github.io/zmrzlina/Poharek_orisky.png" alt="Pohár oříšky" />
      <div class="pohar-info">
        <div class="pohar-name">POHÁR OŘÍŠKY</div>
        <div class="pohar-desc">Zmrzlina · poleva pistácie · lískové oříšky</div>
        <div class="pohar-price">89 Kč</div>
      </div>
    </div>
  </div>
</div>

<script>

const BASE_URL = "https://liberskelahudky.github.io/zmrzlina";

const PRICHUTE = [
  { id: "vanilka",        label: "Vanilka",           img: "15_vanilka.png" },
  { id: "cokolada",       label: "Čokoláda",          img: "16_cokolady.png" },
  { id: "jogurt",         label: "Jogurt",             img: "17_jogurt.png" },
  { id: "meloun",         label: "Červený meloun",     img: "1_meloun.png" },
  { id: "mandarinka",     label: "Mandarinka",         img: "2_mandarinka.png" },
  { id: "boruvka",        label: "Kan. borůvka",       img: "3_boruvka.png" },
  { id: "jablko",         label: "Zelené jablko",      img: "18_zelenejablko.png" },
  { id: "mango",          label: "Mango",              img: "4_mango.png" },
  { id: "yuzu",           label: "Yuzu",               img: "5_yuzu.png" },
  { id: "visen",          label: "Višeň",              img: "6_visen.png" },
  { id: "jahoda",         label: "Jahoda",             img: "7_jahoda.png" },
  { id: "rybiz",          label: "Černý rybíz",        img: "8_cernyrybiz.png" },
  { id: "malina",         label: "Malina",             img: "9_malina.png" },
  { id: "pomeranc",       label: "Pomeranč",           img: "10_pomeranc.png" },
  { id: "ostružina",      label: "Modrá ostružina",    img: "11_ostruzina.png" },
  { id: "mrkev",          label: "Mrkev",              img: "12_mrkev.png" },
  { id: "slany_karamel",  label: "Slaný karamel",      img: "13_slanykaramel.png" },
  { id: "pistacie",       label: "Pistácie",           img: "14_pistacie.png" },
  { id: "rakytnik",       label: "Rakytník",           img: "19_rakytnik.png" },
  { id: "misana",         label: "Míchaná",             img: null },
];

const PRODEJNY = [
  { id: "naporic",    label: "Na Poříčí" },
  { id: "holesovice", label: "Holešovice" },
  { id: "vodicova",   label: "Vodičkova" },
  { id: "krc",        label: "Krč" },
  { id: "letna",      label: "Letná" },
  { id: "palmovka",   label: "Palmovka" },
  { id: "palmovka_c", label: "Palmovka – cukrárna" },
  { id: "smichov",    label: "Smíchov" },
  { id: "haje",       label: "Háje" },
  { id: "dbk",        label: "DBK" },
  { id: "dejvice",    label: "Dejvice" },
  { id: "cb",         label: "České Budějovice" },
  { id: "ipp",        label: "I.P. Pavlova" },
];

function getImgUrl(imgFile) {
  if (!imgFile) return null;
  return BASE_URL + '/' + imgFile;
}

const PETIPAKA = ['dbk', 'krc']; // 5-páka prodejny

function isPetipaka(storeId) {
  return PETIPAKA.includes(storeId);
}

// Michana slot = combined image of two flavors
function renderMichana(flavor1, flavor2, size) {
  const img1 = getImgSrc(flavor1);
  const img2 = getImgSrc(flavor2);
  const label = `${flavor1 ? flavor1.label : '?'} + ${flavor2 ? flavor2.label : '?'}`;
  
  return `
    <div class="flavor-label">
      <div class="flavor-name" style="font-size:${size}">MÍCHANÁ</div>
      <div class="flavor-sub">${label.toUpperCase()}</div>
    </div>
    <div class="ice-img-wrap michana-wrap">
      <div class="michana-half michana-left">
        ${img1 ? `<img class="ice-img michana-img" src="${img1}" />` : '<div class="no-img">🍦</div>'}
      </div>
      <div class="michana-half michana-right">
        ${img2 ? `<img class="ice-img michana-img" src="${img2}" />` : '<div class="no-img">🍦</div>'}
      </div>
    </div>
    <div class="slot-price">45,-</div>
  `;
}


const GIST_ID_KEY = 'll_gist_id';
const CACHE_KEY = 'll_flavor_cache';
const REFRESH_MS = 300000;

function getURLParams() {
  const p = new URLSearchParams(window.location.search);
  return { store: p.get('store'), gistId: p.get('gist') || localStorage.getItem(GIST_ID_KEY) };
}

function getToken() {
  const t = new URLSearchParams(window.location.search).get('token');
  if (t) localStorage.setItem('ll_gh_token', t);
  return localStorage.getItem('ll_gh_token');
}

function getFlavorById(id) { return id ? PRICHUTE.find(f => f.id === id) : null; }
function getImgSrc(flavor) { return (flavor && flavor.img) ? getImgUrl(flavor.img) : null; }

function saveCache(storeId, data) {
  try {
    const all = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
    all[storeId] = data;
    localStorage.setItem(CACHE_KEY, JSON.stringify(all));
  } catch(e) {}
}

function loadCache(storeId) {
  try {
    const all = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
    return all[storeId] || null;
  } catch(e) { return null; }
}

function renderTop(storeId, data) {
  const zone = document.getElementById('top-zone');
  const petipaka = isPetipaka(storeId);

  const f1 = getFlavorById(data?.slot1);
  const f2 = getFlavorById(data?.slot2);
  const f3 = getFlavorById(data?.slot3);

  if (!f1 && !f2) {
    zone.className = 'top-zone';
    zone.innerHTML = '<div class="empty-msg">NASTAVTE PŘÍCHUTĚ V ADMIN PANELU</div>';
    return;
  }

  const nameSize = petipaka ? '2vw' : '3.2vw';
  const priceSize = petipaka ? '1.8vw' : '2.5vw';

  zone.className = `top-zone layout-${petipaka ? 5 : 3}`;
  zone.innerHTML = `
    <div class="text-block">
      <div class="label-zmrzlina">ZMRZLINA</div>
      <div class="label-tocena">točená</div>
    </div>
  `;

  const iceCreams = document.createElement('div');
  iceCreams.className = 'ice-creams';

  function addDivider() {
    const d = document.createElement('div');
    d.className = 'divider-v';
    iceCreams.appendChild(d);
  }

  function addSlot(html) {
    const slot = document.createElement('div');
    slot.className = 'ice-cream-slot';
    slot.innerHTML = html;
    iceCreams.appendChild(slot);
  }

  function normalSlot(flavor) {
    const imgSrc = getImgSrc(flavor);
    return `
      <div class="flavor-label">
        <div class="flavor-name" style="font-size:${nameSize}">${flavor.label.toUpperCase()}</div>
        <div class="flavor-sub">PŘÍCHUŤ</div>
      </div>
      <div class="ice-img-wrap">
        ${imgSrc ? `<img class="ice-img" src="${imgSrc}" alt="${flavor.label}" />` : '<div style="font-size:4rem;opacity:0.3">🍦</div>'}
      </div>
      <div class="slot-price" style="font-size:${priceSize}">45,-</div>
    `;
  }

  if (petipaka) {
    // 5-páka: f1, f2, f3 jsou základní příchutě (nikdy míšená)
    // zobrazení: f1, f2, f3, míšená(f1+f2), míšená(f2+f3)
    if (f1) addSlot(normalSlot(f1));
    if (f2) { addDivider(); addSlot(normalSlot(f2)); }
    if (f3) { addDivider(); addSlot(normalSlot(f3)); }
    if (f1 && f2) { addDivider(); addSlot(renderMichana(f1, f2, nameSize)); }
    if (f2 && f3) { addDivider(); addSlot(renderMichana(f2, f3, nameSize)); }
  } else {
    // 3-páka: f1, f2, míšená(f1+f2)
    if (f1) addSlot(normalSlot(f1));
    if (f2) { addDivider(); addSlot(normalSlot(f2)); }
    if (f1 && f2) { addDivider(); addSlot(renderMichana(f1, f2, nameSize)); }
  }

  zone.appendChild(iceCreams);
}

function spawnCandies(containerId, type) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const lentilkyColors = ['#e74c3c','#f1c40f','#3498db','#2ecc71','#e67e22','#9b59b6','#ff69b4','#00bfff','#ff4500','#32cd32'];
  for (let i = 0; i < 25; i++) {
    const el = document.createElement('div');
    el.className = 'candy';
    if (type === 'orisky') {
      el.textContent = Math.random() < 0.6 ? '🥜' : '🌰';
      el.style.fontSize = (0.8 + Math.random() * 0.7) + 'rem';
    } else {
      const color = lentilkyColors[Math.floor(Math.random() * lentilkyColors.length)];
      const size = (7 + Math.random() * 9) + 'px';
      el.style.width = size; el.style.height = size;
      el.style.background = color; el.style.borderRadius = '50%';
      el.style.boxShadow = '0 1px 4px rgba(0,0,0,0.5)';
    }
    el.style.left = (Math.random() * 95) + '%';
    el.style.animationDuration = (2.5 + Math.random() * 4) + 's';
    el.style.animationDelay = (Math.random() * -7) + 's';
    container.appendChild(el);
  }
}

async function loadFromGist(gistId, storeId) {
  try {
    const token = getToken();
    const headers = token ? { Authorization: `token ${token}` } : {};
    const res = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`, { headers });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const file = data.files['lbrzlina.json'];
    if (!file) return null;
    const parsed = JSON.parse(file.content)[storeId];
    if (parsed) saveCache(storeId, parsed);
    return parsed || null;
  } catch(e) {
    console.warn('API error, using cache');
    return null;
  }
}

async function init() {
  const { store, gistId } = getURLParams();
  if (gistId) localStorage.setItem(GIST_ID_KEY, gistId);

  spawnCandies('pohar-lentilky', 'lentilky');
  spawnCandies('pohar-orisky', 'orisky');

  async function refresh() {
    if (!gistId || !store) return;
    const fresh = await loadFromGist(gistId, store);
    const data = fresh || loadCache(store);
    renderTop(store, data);
  }

  await refresh();
  setInterval(refresh, REFRESH_MS);
}

init();
</script>
</body>
</html>
