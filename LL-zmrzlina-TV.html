
<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zmrzlina točená – TV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Ms+Madi&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #2a1508; }

  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 70% 50%, #4a2310 0%, #2a1508 45%, #1a0c04 100%);
  }

  /* MAIN LAYOUT */
  .wrapper {
    position: relative; width: 100vw; height: 100vh;
    display: flex; flex-direction: column; z-index: 1;
  }

  /* TOP ZONE – točená zmrzlina */
  .top-zone {
    flex: 1; position: relative; display: flex; align-items: stretch;
    min-height: 0;
  }

  .text-block {
    position: absolute; left: 3vw; bottom: 2vh; z-index: 10;
  }
  .label-zmrzlina {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5vw; color: #fff;
    line-height: 0.9; white-space: nowrap; letter-spacing: 0.05em;
  }
  .label-tocena {
    font-family: 'Ms Madi', cursive;
    font-size: 4vw; color: #dfbd95; line-height: 1.2;
  }

  .price-bubble {
    position: absolute; z-index: 20;
    width: 10vw; height: 10vw;
    min-width: 90px; min-height: 90px;
    background: white; border-radius: 50% 50% 50% 10%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    top: 50%; transform: translateY(-50%);
  }
  .price-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3vw; color: #2a1508; white-space: nowrap;
  }

  .ice-creams {
    position: absolute; top: 0; right: 0; height: 100%;
    display: flex; align-items: stretch;
  }
  .ice-cream-slot {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; position: relative;
  }
  .flavor-label {
    position: absolute; top: 3vh; text-align: center; z-index: 10; width: 100%; padding: 0 10px;
  }
  .flavor-name {
    font-family: 'Bebas Neue', sans-serif; color: white;
    text-transform: uppercase; letter-spacing: 0.08em;
    text-shadow: 0 2px 15px rgba(0,0,0,0.8); white-space: nowrap;
  }
  .flavor-sub {
    font-family: 'Bebas Neue', sans-serif; color: rgba(255,255,255,0.7);
    letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 1.1vw;
  }
  .flavor-sub::before, .flavor-sub::after {
    content: ''; display: block; height: 1px; width: 20px; background: rgba(255,255,255,0.5);
  }
  .ice-img {
    width: 100%; height: 100%; object-fit: contain;
    mix-blend-mode: lighten; filter: drop-shadow(0 10px 40px rgba(0,0,0,0.3));
  }
  .divider-v {
    width: 1px; height: 55vh; background: rgba(223,189,149,0.2); align-self: center; flex-shrink: 0;
  }

  .layout-1 .ice-creams { width: 68vw; left: 24vw; }
  .layout-1 .ice-cream-slot { width: 100%; }
  .layout-1 .flavor-name { font-size: 6.5vw; }
  .layout-1 .price-bubble { left: 20vw; }

  .layout-2 .ice-creams { width: 72vw; left: 20vw; }
  .layout-2 .ice-cream-slot { width: 50%; }
  .layout-2 .flavor-name { font-size: 4.2vw; }
  .layout-2 .price-bubble { left: 20vw; }

  .layout-3 .ice-creams { width: 76vw; left: 17vw; }
  .layout-3 .ice-cream-slot { width: 33.33%; }
  .layout-3 .flavor-name { font-size: 2.6vw; }
  .layout-3 .price-bubble { left: 17vw; }

  /* BOTTOM ZONE – pohárky */
  .bottom-zone {
    height: 28vh; flex-shrink: 0;
    display: flex;
    border-top: 1px solid rgba(223,189,149,0.25);
    background: rgba(0,0,0,0.3);
  }

  .pohar-slot {
    flex: 1; display: flex; align-items: center;
    padding: 0 3vw; gap: 2vw; position: relative;
  }
  .pohar-slot:first-child {
    border-right: 1px solid rgba(223,189,149,0.2);
  }

  .pohar-img {
    height: 22vh; object-fit: contain; mix-blend-mode: lighten;
    filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4));
    flex-shrink: 0;
  }

  .pohar-info { flex: 1; }
  .pohar-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3vw; color: #dfbd95; letter-spacing: 0.05em;
    line-height: 1;
  }
  .pohar-desc {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4vw; color: rgba(255,255,255,0.6);
    letter-spacing: 0.1em; margin-top: 4px; line-height: 1.4;
  }
  .pohar-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8vw; color: white;
    background: rgba(209,75,31,0.8);
    padding: 4px 16px; border-radius: 6px;
    margin-top: 8px; display: inline-block;
    letter-spacing: 0.05em;
  }

  .empty-msg {
    color: rgba(255,255,255,0.3); font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; margin: auto; letter-spacing: 0.1em; position: relative; z-index: 10;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.8) translateY(-50%); }
    to { opacity: 1; transform: scale(1) translateY(-50%); }
  }
  .text-block { animation: fadeInUp 0.8s ease forwards; }
  .price-bubble { animation: scaleIn 0.6s 0.3s ease both; }
  .ice-cream-slot:nth-child(1) { animation: fadeInUp 0.7s 0.1s ease both; }
  .ice-cream-slot:nth-child(3) { animation: fadeInUp 0.7s 0.2s ease both; }
  .ice-cream-slot:nth-child(5) { animation: fadeInUp 0.7s 0.3s ease both; }
  .bottom-zone { animation: fadeInUp 0.8s 0.4s ease both; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrapper">
  <div class="top-zone" id="top-zone"></div>
  <div class="bottom-zone">
    <div class="pohar-slot">
      <img class="pohar-img" src="https://liberskelahudky.github.io/zmrzlina/poharek_lentilka.png" alt="Pohár lentilky" />
      <div class="pohar-info">
        <div class="pohar-name">POHÁR LENTILKY</div>
        <div class="pohar-desc">Zmrzlina · poleva čokoláda · lentilky</div>
        <div class="pohar-price">79 Kč</div>
      </div>
    </div>
    <div class="pohar-slot">
      <img class="pohar-img" src="https://liberskelahudky.github.io/zmrzlina/poharek_orisky.png" alt="Pohár oříšky" />
      <div class="pohar-info">
        <div class="pohar-name">POHÁR OŘÍŠKY</div>
        <div class="pohar-desc">Zmrzlina · poleva pistácie · lískové oříšky</div>
        <div class="pohar-price">89 Kč</div>
      </div>
    </div>
  </div>
</div>

<script>

const BASE_URL = "https://liberskelahudky.github.io/zmrzlina";

const PRICHUTE = [
  { id: "vanilka",        label: "Vanilka",           img: "Vanilka.png" },
  { id: "cokolada",       label: "Čokoláda",          img: "Cokolada.png" },
  { id: "jogurt",         label: "Jogurt",             img: "Jogurt.png" },
  { id: "meloun",         label: "Červený meloun",     img: "Meloun.png" },
  { id: "mandarinka",     label: "Mandarinka",         img: "Mandarinka.png" },
  { id: "boruvka",        label: "Kan. borůvka",       img: "Kanadska-Boruvka.png" },
  { id: "jablko",         label: "Zelené jablko",      img: "Zelene-Jablko.png" },
  { id: "mango",          label: "Mango",              img: "Mango.png" },
  { id: "yuzu",           label: "Yuzu",               img: null },
  { id: "visen",          label: "Višeň",              img: "Visen.png" },
  { id: "jahoda",         label: "Jahoda",             img: "Jahoda.png" },
  { id: "rybiz",          label: "Černý rybíz",        img: "Cerny-Rybiz.png" },
  { id: "rakytnik",       label: "Rakytník",           img: "Rakytnik.png" },
  { id: "malina",         label: "Malina",             img: "Malina.png" },
  { id: "pomeranc",       label: "Pomeranč",           img: "Pomeranc.png" },
  { id: "ostružina",      label: "Modrá ostružina",    img: "Modra_ostruzina.png" },
  { id: "mrkev",          label: "Mrkev",              img: "Mrkev.png" },
  { id: "slany_karamel",  label: "Slaný karamel",      img: "Slany-Karamel.png" },
  { id: "pistacie",       label: "Pistácie",           img: "Pistacie.png" },
  { id: "misana",         label: "Míšená",             img: null },
];

const PRODEJNY = [
  { id: "naporic",    label: "Na Poříčí" },
  { id: "holesovice", label: "Holešovice" },
  { id: "vodicova",   label: "Vodičkova" },
  { id: "krc",        label: "Krč" },
  { id: "letna",      label: "Letná" },
  { id: "palmovka",   label: "Palmovka" },
  { id: "palmovka_c", label: "Palmovka – cukrárna" },
  { id: "smichov",    label: "Smíchov" },
  { id: "haje",       label: "Háje" },
  { id: "dbk",        label: "DBK" },
  { id: "dejvice",    label: "Dejvice" },
  { id: "cb",         label: "České Budějovice" },
  { id: "ipp",        label: "I.P. Pavlova" },
];

function getImgUrl(imgFile) {
  if (!imgFile) return null;
  return BASE_URL + '/' + imgFile;
}


const GIST_ID_KEY = 'll_gist_id';
const REFRESH_MS = 60000;

// Cache – při chybě API zobrazíme poslední známé příchutě
let lastKnownFlavors = null;

function getURLParams() {
  const p = new URLSearchParams(window.location.search);
  return { store: p.get('store'), gistId: p.get('gist') || localStorage.getItem(GIST_ID_KEY) };
}

function getFlavorById(id) { return id ? PRICHUTE.find(f => f.id === id) : null; }
function getImgSrc(flavor) { return (flavor && flavor.img) ? getImgUrl(flavor.img) : null; }

function renderTop(flavors) {
  const zone = document.getElementById('top-zone');
  const valid = flavors.filter(Boolean);
  const count = valid.length;

  if (count === 0) {
    zone.className = 'top-zone';
    zone.innerHTML = '<div class="empty-msg">ŽÁDNÁ PŘÍCHUŤ NENÍ NASTAVENA</div>';
    return;
  }

  zone.className = `top-zone layout-${count}`;
  zone.innerHTML = `
    <div class="text-block">
      <div class="label-zmrzlina">ZMRZLINA</div>
      <div class="label-tocena">točená</div>
    </div>
    <div class="price-bubble"><span class="price-text">45,–</span></div>
  `;

  const iceCreams = document.createElement('div');
  iceCreams.className = 'ice-creams';

  valid.forEach((flavor, i) => {
    if (i > 0) {
      const d = document.createElement('div');
      d.className = 'divider-v';
      iceCreams.appendChild(d);
    }
    const slot = document.createElement('div');
    slot.className = 'ice-cream-slot';
    const imgSrc = getImgSrc(flavor);
    slot.innerHTML = `
      <div class="flavor-label">
        <div class="flavor-name">${flavor.label.toUpperCase()}</div>
        <div class="flavor-sub">PŘÍCHUŤ</div>
      </div>
      ${imgSrc ? `<img class="ice-img" src="${imgSrc}" alt="${flavor.label}" />` : '<div style="font-size:5rem;opacity:0.3">🍦</div>'}
    `;
    iceCreams.appendChild(slot);
  });

  zone.appendChild(iceCreams);
}

async function loadFromGist(gistId, storeId) {
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const file = data.files['lbrzlina.json'];
    if (!file) return null;
    return JSON.parse(file.content)[storeId] || null;
  } catch(e) {
    console.warn('Gist error, using cache:', e);
    return null;
  }
}

async function init() {
  const { store, gistId } = getURLParams();
  if (gistId) localStorage.setItem(GIST_ID_KEY, gistId);

  async function refresh() {
    if (!gistId || !store) return;
    const storeData = await loadFromGist(gistId, store);
    
    if (storeData) {
      // Ulož do cache
      lastKnownFlavors = [
        getFlavorById(storeData.slot1),
        getFlavorById(storeData.slot2),
        getFlavorById(storeData.slot3),
      ];
    }
    
    // Zobraz cache nebo prázdno
    if (lastKnownFlavors) {
      renderTop(lastKnownFlavors);
    } else {
      renderTop([]);
    }
  }

  await refresh();
  setInterval(refresh, REFRESH_MS);
}

init();
</script>
</body>
</html>
