<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zmrzlina točená – TV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&family=Dancing+Script:wght@700&display=swap');
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #1a0c04; }
 
  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 60% 50%, #4a2310 0%, #2a1508 50%, #1a0c04 100%);
  }
 
  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: stretch;
  }
 
  /* LEFT PANEL */
  .left-panel {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 5vh 3vw 6vh 4vw;
    flex-shrink: 0;
    width: 22vw;
  }
 
  .label-zmrzlina {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(3rem, 5.5vw, 7rem);
    color: #fff;
    line-height: 0.88;
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }
  .label-tocena {
    font-family: 'Dancing Script', cursive;
    font-weight: 700;
    font-size: clamp(2rem, 3.5vw, 4.5rem);
    color: #dfbd95;
    line-height: 1.1;
  }
 
  /* PRICE */
  .price-bubble {
    position: absolute;
    left: 20vw;
    top: 50%;
    transform: translate(-50%, -50%);
    width: clamp(80px, 9vw, 120px);
    height: clamp(80px, 9vw, 120px);
    background: white;
    border-radius: 50% 50% 50% 8%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
  .price-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 3vw, 2.8rem);
    color: #1a0c04;
    line-height: 1;
  }
 
  /* ICE CREAM AREA */
  .ice-creams {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 10;
    padding: 2vh 2vw;
    gap: 0;
  }
 
  .ice-cream-slot {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    position: relative;
    padding: 0 1vw;
  }
 
  .flavor-label {
    position: absolute;
    top: 6vh;
    text-align: center;
    width: 100%;
    z-index: 10;
    padding: 0 10px;
  }
  .flavor-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    color: white;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 0.95;
    text-shadow: 0 2px 15px rgba(0,0,0,0.8);
  }
  .flavor-sub {
    font-family: 'Barlow Condensed', sans-serif;
    color: rgba(255,255,255,0.65);
    font-size: clamp(0.7rem, 1.2vw, 1.1rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .flavor-sub::before, .flavor-sub::after {
    content: ''; display: block; height: 1px; width: 20px;
    background: rgba(255,255,255,0.4);
  }
 
  .ice-img {
    width: 100%;
    height: 80vh;
    object-fit: contain;
    mix-blend-mode: lighten;
  }
 
  .no-img-placeholder {
    font-size: 8rem;
    opacity: 0.3;
  }
 
  .divider {
    width: 1px;
    height: 55vh;
    background: rgba(223,189,149,0.2);
    flex-shrink: 0;
  }
 
  /* Font sizes per layout */
  .layout-1 .flavor-name { font-size: clamp(3rem, 6vw, 7rem); }
  .layout-1 .ice-img { height: 88vh; }
 
  .layout-2 .flavor-name { font-size: clamp(2.2rem, 4vw, 5rem); }
  .layout-2 .ice-img { height: 80vh; }
 
  .layout-3 .flavor-name { font-size: clamp(1.5rem, 2.8vw, 3.5rem); }
  .layout-3 .ice-img { height: 72vh; }
 
  .empty-msg {
    color: rgba(255,255,255,0.25);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.15em;
    margin: auto;
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: translate(-50%,-50%) scale(0.7); }
    to { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }
  .left-panel { animation: fadeUp 0.9s ease both; }
  .price-bubble { animation: popIn 0.6s 0.3s ease both; }
  .ice-cream-slot { animation: fadeUp 0.8s ease both; }
  .ice-cream-slot:nth-child(1) { animation-delay: 0.1s; }
  .ice-cream-slot:nth-child(3) { animation-delay: 0.2s; }
  .ice-cream-slot:nth-child(5) { animation-delay: 0.3s; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="scene" id="scene"></div>
 
<script>
 
const BASE_URL = "https://liberskelahudky.github.io/zmrzlina";
 
const PRICHUTE = [
  { id: "vanilka",        label: "Vanilka",           img: "Vanilka.png" },
  { id: "cokolada",       label: "Čokoláda",          img: "Cokolada.png" },
  { id: "jogurt",         label: "Jogurt",             img: "Jogurt.png" },
  { id: "meloun",         label: "Červený meloun",     img: "Meloun.png" },
  { id: "mandarinka",     label: "Mandarinka",         img: "Mandarinka.png" },
  { id: "boruvka",        label: "Kan. borůvka",       img: "Kanadska-Boruvka.png" },
  { id: "jablko",         label: "Zelené jablko",      img: "Zelene-Jablko.png" },
  { id: "mango",          label: "Mango",              img: "Mango.png" },
  { id: "yuzu",           label: "Yuzu",               img: null },
  { id: "visen",          label: "Višeň",              img: "Visen.png" },
  { id: "jahoda",         label: "Jahoda",             img: "Jahoda.png" },
  { id: "rybiz",          label: "Černý rybíz",        img: "Cerny-Rybiz.png" },
  { id: "rakytnik",       label: "Rakytník",           img: "Rakytnik.png" },
  { id: "malina",         label: "Malina",             img: "Malina.png" },
  { id: "pomeranc",       label: "Pomeranč",           img: "Pomeranc.png" },
  { id: "ostružina",      label: "Modrá ostružina",    img: "Modra_ostruzina.png" },
  { id: "mrkev",          label: "Mrkev",              img: "Mrkev.png" },
  { id: "slany_karamel",  label: "Slaný karamel",      img: "Slany-Karamel.png" },
  { id: "pistacie",       label: "Pistácie",           img: "Pistacie.png" },
  { id: "misana",         label: "Míšená",             img: null },
];
 
const PRODEJNY = [
  { id: "naporic",    label: "Na Poříčí" },
  { id: "holesovice", label: "Holešovice" },
  { id: "vodicova",   label: "Vodičkova" },
  { id: "krc",        label: "Krč" },
  { id: "letna",      label: "Letná" },
  { id: "palmovka",   label: "Palmovka" },
  { id: "palmovka_c", label: "Palmovka – cukrárna" },
  { id: "smichov",    label: "Smíchov" },
  { id: "haje",       label: "Háje" },
  { id: "dbk",        label: "DBK" },
  { id: "dejvice",    label: "Dejvice" },
  { id: "cb",         label: "České Budějovice" },
  { id: "ipp",        label: "I.P. Pavlova" },
];
 
function getImgUrl(imgFile) {
  if (!imgFile) return null;
  return BASE_URL + '/' + imgFile;
}
 
 
const GIST_ID_KEY = 'll_gist_id';
const REFRESH_MS = 60000;
 
function getURLParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    store: p.get('store'),
    gistId: p.get('gist') || localStorage.getItem(GIST_ID_KEY),
  };
}
 
function getFlavorById(id) {
  return id ? PRICHUTE.find(f => f.id === id) : null;
}
 
function renderScene(flavors) {
  const scene = document.getElementById('scene');
  const valid = flavors.filter(Boolean);
  const count = valid.length;
 
  if (count === 0) {
    scene.className = 'scene';
    scene.innerHTML = '<div class="empty-msg">ŽÁDNÁ PŘÍCHUŤ NENÍ NASTAVENA</div>';
    return;
  }
 
  scene.className = `scene layout-${count}`;
 
  let html = `
    <div class="left-panel">
      <div class="label-zmrzlina">ZMRZ<br>LINA</div>
      <div class="label-tocena">točená</div>
    </div>
    <div class="price-bubble"><span class="price-text">45,–</span></div>
    <div class="ice-creams">
  `;
 
  valid.forEach((flavor, i) => {
    if (i > 0) html += `<div class="divider"></div>`;
    const imgUrl = flavor.img ? getImgUrl(flavor.img) : null;
    html += `
      <div class="ice-cream-slot">
        <div class="flavor-label">
          <div class="flavor-name">${flavor.label.toUpperCase()}</div>
          <div class="flavor-sub">PŘÍCHUŤ</div>
        </div>
        ${imgUrl
          ? `<img class="ice-img" src="${imgUrl}" alt="${flavor.label}" />`
          : `<div class="no-img-placeholder">🍦</div>`}
      </div>
    `;
  });
 
  html += `</div>`;
  scene.innerHTML = html;
}
 
async function loadFromGist(gistId, storeId) {
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`);
    const data = await res.json();
    const file = data.files['lbrzlina.json'];
    if (!file) return null;
    return JSON.parse(file.content)[storeId] || null;
  } catch(e) {
    console.error('Gist error:', e);
    return null;
  }
}
 
async function init() {
  const { store, gistId } = getURLParams();
  if (gistId) localStorage.setItem(GIST_ID_KEY, gistId);
 
  async function refresh() {
    if (!gistId || !store) { renderScene([]); return; }
    const storeData = await loadFromGist(gistId, store);
    renderScene([
      getFlavorById(storeData?.slot1),
      getFlavorById(storeData?.slot2),
      getFlavorById(storeData?.slot3),
    ]);
  }
 
  await refresh();
  setInterval(refresh, REFRESH_MS);
}
 
init();
</script>
</body>
</html>
