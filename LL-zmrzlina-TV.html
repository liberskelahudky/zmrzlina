<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zmrzlina – TV</title>
<link href="https://fonts.googleapis.com/css?family=Bebas+Neue" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #3d1e08; font-family: Arial, sans-serif; }

  .bg {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #2a1008;
    background: -webkit-radial-gradient(65% 40%, ellipse, #7a3515, #4a2010 30%, #2a1008 70%, #1a0804);
  }

  .top-zone {
    position: absolute; top: 0; left: 0; right: 0; bottom: 28%;
    z-index: 2;
  }

  .text-block {
    position: absolute; left: 3%; bottom: 3%; z-index: 10;
  }
  .label-zmrzlina {
    font-family: 'Bebas Neue', Arial, sans-serif;
    font-size: 5.5vw; color: #fff;
    line-height: 0.9; letter-spacing: 0.05em;
  }
  .label-tocena {
    font-family: Georgia, serif; font-style: italic;
    font-size: 4vw; color: #dfbd95; line-height: 1.2;
  }

  .ice-creams {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 75%;
  }

  .ice-cream-slot {
    position: absolute; top: 0; bottom: 0;
    text-align: center;
  }

  .flavor-label {
    position: absolute; top: 3%; left: 0; right: 0;
    text-align: center; z-index: 10;
  }
  .flavor-name {
    font-family: 'Bebas Neue', Arial, sans-serif; color: white;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .flavor-sub {
    font-family: 'Bebas Neue', Arial, sans-serif;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.15em; text-transform: uppercase;
    margin-top: 4px; font-size: 1.1vw;
  }

  .ice-img-wrap {
    position: absolute; top: 12%; bottom: 12%; left: 5%; right: 5%;
    text-align: center;
  }
  .ice-img {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    border: 0;
  }

  .slot-price {
    position: absolute; bottom: 3%; right: 10%;
    font-family: 'Bebas Neue', Arial, sans-serif;
    font-size: 3vw; color: white;
    z-index: 10;
  }

  .michana-wrap {
    position: absolute; top: 12%; bottom: 12%; left: 5%; right: 5%;
    overflow: hidden;
  }
  .michana-half {
    position: absolute; top: 0; width: 50%; height: 100%;
    overflow: hidden;
  }
  .michana-left { left: 0; }
  .michana-right { right: 0; }
  .michana-img {
    position: absolute; top: 0; height: 100%;
    border: 0;
  }
  .michana-left .michana-img { left: 0; }
  .michana-right .michana-img { right: 0; }

  /* BOTTOM ZONE */
  .bottom-zone {
    position: absolute; left: 0; right: 0; bottom: 0; height: 28%;
    border-top: 1px solid rgba(223,189,149,0.25);
    background: rgba(0,0,0,0.35);
    z-index: 2;
  }

  .pohar-left {
    position: absolute; left: 0; top: 0; bottom: 0; width: 50%;
    border-right: 1px solid rgba(223,189,149,0.2);
    overflow: hidden;
  }
  .pohar-right {
    position: absolute; right: 0; top: 0; bottom: 0; width: 50%;
    overflow: hidden;
  }

  .pohar-img {
    position: absolute; left: 2%; top: 5%; height: 90%;
    width: auto;
    z-index: 2;
  }
  .pohar-info {
    position: absolute; left: 30%; top: 10%; right: 5%;
    z-index: 2;
  }
  .pohar-name { font-family: 'Bebas Neue', Arial, sans-serif; font-size: 3vw; color: #dfbd95; }
  .pohar-desc { font-family: 'Bebas Neue', Arial, sans-serif; font-size: 1.4vw; color: rgba(255,255,255,0.6); margin-top: 6px; }
  .pohar-price { font-family: 'Bebas Neue', Arial, sans-serif; font-size: 3vw; color: white; background: rgba(209,75,31,0.9); padding: 4px 18px; border-radius: 6px; margin-top: 10px; display: inline-block; }

  .empty-msg {
    position: absolute; top: 40%; left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.3); font-family: 'Bebas Neue', Arial, sans-serif;
    font-size: 2rem; z-index: 10;
  }

  /* Candy animation */
  .candy {
    position: absolute; pointer-events: none; z-index: 1;
    -webkit-animation: fallCandy linear infinite;
    animation: fallCandy linear infinite;
  }
  @-webkit-keyframes fallCandy {
    0%   { -webkit-transform: translateY(-30px) rotate(0deg); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { -webkit-transform: translateY(200px) rotate(600deg); opacity: 0; }
  }
  @keyframes fallCandy {
    0%   { transform: translateY(-30px) rotate(0deg); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { transform: translateY(200px) rotate(600deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="top-zone" id="top-zone"></div>
<div class="bottom-zone">
  <div class="pohar-left" id="pohar-lentilky">
    <img class="pohar-img" src="https://liberskelahudky.github.io/zmrzlina/Poharek_lentilka.png" alt="" />
    <div class="pohar-info">
      <div class="pohar-name">POHÁR LENTILKY</div>
      <div class="pohar-desc">Zmrzlina · poleva čokoláda · lentilky</div>
      <div class="pohar-price">79 Kč</div>
    </div>
  </div>
  <div class="pohar-right" id="pohar-orisky">
    <img class="pohar-img" src="https://liberskelahudky.github.io/zmrzlina/Poharek_orisky.png" alt="" />
    <div class="pohar-info">
      <div class="pohar-name">POHÁR OŘÍŠKY</div>
      <div class="pohar-desc">Zmrzlina · poleva pistácie · lískové oříšky</div>
      <div class="pohar-price">89 Kč</div>
    </div>
  </div>
</div>

<script>
var BASE_URL = "https://liberskelahudky.github.io/zmrzlina";
var PRICHUTE = [
  { id: "vanilka", label: "Vanilka", img: "15_vanilka.png" },
  { id: "cokolada", label: "\u010cokol\u00e1da", img: "16_cokolady.png" },
  { id: "jogurt", label: "Jogurt", img: "17_jogurt.png" },
  { id: "meloun", label: "\u010cerven\u00fd meloun", img: "1_meloun.png" },
  { id: "mandarinka", label: "Mandarinka", img: "2_mandarinka.png" },
  { id: "boruvka", label: "Kan. bor\u016fvka", img: "3_boruvka.png" },
  { id: "jablko", label: "Zelen\u00e9 jablko", img: "18_zelenejablko.png" },
  { id: "mango", label: "Mango", img: "4_mango.png" },
  { id: "yuzu", label: "Yuzu", img: "5_yuzu.png" },
  { id: "visen", label: "Vi\u0161e\u0148", img: "6_visen.png" },
  { id: "jahoda", label: "Jahoda", img: "7_jahoda.png" },
  { id: "rybiz", label: "\u010cern\u00fd ryb\u00edz", img: "8_cernyrybiz.png" },
  { id: "malina", label: "Malina", img: "9_malina.png" },
  { id: "pomeranc", label: "Pomeran\u010d", img: "10_pomeranc.png" },
  { id: "ostruzina", label: "Modr\u00e1 ostru\u017eina", img: "11_ostruzina.png" },
  { id: "mrkev", label: "Mrkev", img: "12_mrkev.png" },
  { id: "slany_karamel", label: "Slan\u00fd karamel", img: "13_slanykaramel.png" },
  { id: "pistacie", label: "Pist\u00e1cie", img: "14_pistacie.png" },
  { id: "rakytnik", label: "Rakytn\u00edk", img: "19_rakytnik.png" },
  { id: "misana", label: "M\u00edchan\u00e1", img: null }
];
var PETIPAKA = ["dbk", "krc"];
var REFRESH_MS = 300000;
var lastData = null;

function getParam(name) {
  var r = new RegExp("[?&]" + name + "=([^&#]*)");
  var m = window.location.search.match(r);
  return m ? decodeURIComponent(m[1]) : null;
}

function findFlavor(id) {
  if (!id) return null;
  for (var i = 0; i < PRICHUTE.length; i++) {
    if (PRICHUTE[i].id === id) return PRICHUTE[i];
  }
  return null;
}

function imgUrl(f) {
  return (f && f.img) ? BASE_URL + "/" + f.img : "";
}

function saveCache(sid, d) {
  try { var a = JSON.parse(localStorage.getItem("llc") || "{}"); a[sid] = d; localStorage.setItem("llc", JSON.stringify(a)); } catch(e) {}
}
function loadCache(sid) {
  try { var a = JSON.parse(localStorage.getItem("llc") || "{}"); return a[sid] || null; } catch(e) { return null; }
}

function renderTop(sid, data) {
  var zone = document.getElementById("top-zone");
  var peti = false;
  for (var p = 0; p < PETIPAKA.length; p++) { if (PETIPAKA[p] === sid) peti = true; }

  var f1 = findFlavor(data ? data.slot1 : null);
  var f2 = findFlavor(data ? data.slot2 : null);
  var f3 = findFlavor(data ? data.slot3 : null);

  if (!f1 && !f2) {
    zone.innerHTML = '<div class="empty-msg">NASTAVTE P\u0158\u00cdCHUT\u011a</div>';
    return;
  }

  // Build slots
  var slots = [];
  if (f1) slots.push({ t: "n", f: f1 });
  if (f2) slots.push({ t: "n", f: f2 });
  if (peti && f3) slots.push({ t: "n", f: f3 });
  if (f1 && f2) slots.push({ t: "m", a: f1, b: f2 });
  if (peti && f2 && f3) slots.push({ t: "m", a: f2, b: f3 });

  var count = slots.length;
  var nameSize = peti ? "2vw" : "3.2vw";
  var iceW = peti ? 80 : 72;
  var iceLeft = 100 - iceW;

  var html = '<div class="text-block">' +
    '<div class="label-zmrzlina">ZMRZLINA</div>' +
    '<div class="label-tocena">to\u010den\u00e1</div></div>' +
    '<div class="ice-creams" style="width:' + iceW + '%;left:' + iceLeft + '%">';

  for (var i = 0; i < count; i++) {
    var s = slots[i];
    var leftPct = (i / count * 100);
    var widthPct = (100 / count);

    html += '<div class="ice-cream-slot" style="left:' + leftPct + '%;width:' + widthPct + '%">';

    if (s.t === "n") {
      html += '<div class="flavor-label">' +
        '<div class="flavor-name" style="font-size:' + nameSize + '">' + s.f.label.toUpperCase() + '</div>' +
        '<div class="flavor-sub">P\u0158\u00cdCHU\u0164</div></div>';
      if (s.f.img) {
        html += '<div class="ice-img-wrap"><img class="ice-img" src="' + imgUrl(s.f) + '" style="max-width:90%;max-height:100%;width:auto;height:auto;display:inline-block" /></div>';
      }
      html += '<div class="slot-price">45,-</div>';
    } else {
      var label = s.a.label + " + " + s.b.label;
      html += '<div class="flavor-label">' +
        '<div class="flavor-name" style="font-size:' + nameSize + '">M\u00cdCHAN\u00c1</div>' +
        '<div class="flavor-sub">' + label.toUpperCase() + '</div></div>';
      html += '<div class="michana-wrap">' +
        '<div class="michana-half michana-left">';
      if (s.a.img) html += '<img class="michana-img" src="' + imgUrl(s.a) + '" />';
      html += '</div><div class="michana-half michana-right">';
      if (s.b.img) html += '<img class="michana-img" src="' + imgUrl(s.b) + '" />';
      html += '</div></div>';
      html += '<div class="slot-price">45,-</div>';
    }

    html += '</div>';
  }

  html += '</div>';
  zone.innerHTML = html;
}

function loadGist(gistId, storeId, cb) {
  var token = getParam("token");
  if (token) { try { localStorage.setItem("llt", token); } catch(e) {} }
  else { try { token = localStorage.getItem("llt"); } catch(e) {} }

  var xhr = new XMLHttpRequest();
  xhr.open("GET", "https://api.github.com/gists/" + gistId + "?t=" + new Date().getTime(), true);
  if (token) xhr.setRequestHeader("Authorization", "token " + token);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try {
          var d = JSON.parse(xhr.responseText);
          var f = d.files["lbrzlina.json"];
          if (f && f.content) {
            var p = JSON.parse(f.content);
            var sd = p[storeId] || null;
            if (sd) saveCache(storeId, sd);
            cb(sd);
            return;
          }
        } catch(e) {}
      }
      cb(null);
    }
  };
  xhr.send();
}

function spawnCandies(cid, type) {
  var c = document.getElementById(cid);
  if (!c) return;
  var cols = ["#e74c3c","#f1c40f","#3498db","#2ecc71","#e67e22","#9b59b6","#ff69b4","#00bfff"];
  for (var i = 0; i < 20; i++) {
    var el = document.createElement("div");
    el.className = "candy";
    if (type === "o") {
      el.innerHTML = "&#x1F95C;";
      el.style.fontSize = (0.8 + Math.random() * 0.5) + "rem";
    } else {
      var sz = (6 + Math.random() * 8) + "px";
      el.style.width = sz; el.style.height = sz;
      el.style.background = cols[Math.floor(Math.random() * cols.length)];
      el.style.borderRadius = "50%";
    }
    el.style.left = (Math.random() * 90) + "%";
    var dur = (2.5 + Math.random() * 4) + "s";
    var del = (Math.random() * -7) + "s";
    el.style.webkitAnimationDuration = dur;
    el.style.animationDuration = dur;
    el.style.webkitAnimationDelay = del;
    el.style.animationDelay = del;
    c.appendChild(el);
  }
}

function doRefresh() {
  var sid = getParam("store");
  var gid = getParam("gist");
  if (!gid || !sid) return;

  loadGist(gid, sid, function(fresh) {
    var data = fresh || loadCache(sid);
    if (data) lastData = data;
    renderTop(sid, data || lastData);
  });
}

spawnCandies("pohar-lentilky", "l");
spawnCandies("pohar-orisky", "o");
doRefresh();
setInterval(doRefresh, REFRESH_MS);
</script>
</body>
</html>
